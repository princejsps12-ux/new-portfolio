# Render Blueprint — Infrastructure as Code.
# Commit this file and Render can provision the service automatically
# (New + → "Blueprint"). Or ignore it and configure the service in the
# dashboard using the same values (see the deploy guide).
services:
  - type: web
    name: prince-pandey-portfolio
    runtime: node
    plan: free # bump to "starter" if builds OOM on free's 512MB
    region: singapore # closest to India; also: oregon, frankfurt, ohio
    branch: main
    # --include=dev forces devDependencies (tailwind, postcss, typescript)
    # to install even though Render runs with NODE_ENV=production.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      # Raise the build heap so `next build` doesn't run out of memory.
      - key: NODE_OPTIONS
        value: "--max-old-space-size=2048"
      # NOTE: do NOT set NODE_ENV=production here — it makes npm skip the
      # devDependencies that the build needs. Next.js sets production mode
      # itself during `next build` / `next start`.
